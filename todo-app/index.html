<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App - Local Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📝 My Tasks</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-container">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <select id="prioritySelect" class="priority-select">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat">
                <span class="stat-label">Total Tasks:</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedTasks">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Remaining:</span>
                <span class="stat-value" id="remainingTasks">0</span>
            </div>
        </div>

        <!-- Todos List -->
        <main class="todos-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="🔍 Search tasks..."
                >
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Todos will be dynamically added here -->
            </ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">✨</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </main>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="clearCompleted" class="action-btn secondary">Clear Completed</button>
            <button id="exportBtn" class="action-btn secondary">📥 Export</button>
            <button id="importBtn" class="action-btn secondary">📤 Import</button>
            <input type="file" id="importFile" style="display: none;" accept=".json">
            <button id="resetBtn" class="action-btn danger">Reset All</button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>💾 Auto-saved to local storage</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
